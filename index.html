<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
}

.container{
    width:380px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    color:white;
}

.form-box{
    display:none;
}

.form-box.active{
    display:block;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:15px;
}

.input-box input::placeholder{
    color:#ddd;
}

.input-box input:focus{
    outline:none;
    background:rgba(255,255,255,0.25);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.switch{
    text-align:center;
    margin-top:18px;
    font-size:14px;
}

.switch a{
    color:#00c6ff;
    cursor:pointer;
    text-decoration:none;
}

.error{
    color:#ffb3b3;
    text-align:center;
    margin-bottom:10px;
}

.success{
    color:#8fff8f;
    text-align:center;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

    <!-- تسجيل الدخول -->
    <div class="form-box active" id="loginForm">

        <h2>تسجيل الدخول</h2>

        <div class="input-box">
            <input type="email" placeholder="البريد الإلكتروني">
        </div>

        <div class="input-box">
            <input type="password" placeholder="كلمة المرور">
        </div>

        <button>دخول</button>

        <div class="switch">
            ليس لديك حساب ؟
            <a onclick="showRegister()">إنشاء حساب جديد</a>
        </div>

    </div>

    <!-- إنشاء حساب -->
    <div class="form-box" id="registerForm">

        <h2>إنشاء حساب</h2>

        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>

        <div class="input-box">
            <input type="text" id="username" placeholder="اسم المستخدم">
        </div>

        <div class="input-box">
            <input type="email" id="email" placeholder="البريد الإلكتروني">
        </div>

        <div class="input-box">
            <input type="tel" id="phone" placeholder="رقم الهاتف">
        </div>

        <div class="input-box">
            <input type="password" id="password" placeholder="كلمة المرور">
        </div>

        <div class="input-box">
            <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور">
        </div>

        <button onclick="register()">إنشاء الحساب</button>

        <div class="switch">
            لديك حساب بالفعل ؟
            <a onclick="showLogin()">تسجيل الدخول</a>
        </div>

    </div>

</div>

<script>

// ضع رابط Web App هنا
const SCRIPT_URL = "ضع_رابط_الويب_اب_هنا";

function showRegister(){

    document.getElementById("loginForm").classList.remove("active");
    document.getElementById("registerForm").classList.add("active");

}

function showLogin(){

    document.getElementById("registerForm").classList.remove("active");
    document.getElementById("loginForm").classList.add("active");

}

function register(){

    let username = document.getElementById("username").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    let errorMsg = document.getElementById("errorMsg");
    let successMsg = document.getElementById("successMsg");

    errorMsg.innerHTML = "";
    successMsg.innerHTML = "";

    if(password !== confirmPassword){

        errorMsg.innerHTML = "كلمتا المرور غير متطابقتين";
        return;

    }

    fetch(SCRIPT_URL, {

        method: "POST",

        body: JSON.stringify({

            phone: phone,
            username: username,
            email: email,
            password: password

        })

    })

    .then(res => res.json())

    .then(data => {

        if(data.status == "exists"){

            errorMsg.innerHTML = "البريد الإلكتروني مستخدم مسبقاً";

        }else{

            successMsg.innerHTML = "تم إنشاء الحساب بنجاح";

            document.getElementById("username").value = "";
            document.getElementById("email").value = "";
            document.getElementById("phone").value = "";
            document.getElementById("password").value = "";
            document.getElementById("confirmPassword").value = "";

            setTimeout(() => {

                showLogin();

            },1500);

        }

    })

    .catch(error => {

        errorMsg.innerHTML = "حدث خطأ أثناء الاتصال";

    });

}

</script>

</body>
</html>
