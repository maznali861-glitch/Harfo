<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إرسال بيانات</title>

<style>

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.box{
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
    width:300px;
}

h2{
    color:white;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    background:#00b894;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#msg{
    color:white;
    text-align:center;
    margin-top:10px;
}

</style>
</head>
<body>

<div class="box">

<h2>تسجيل البيانات</h2>

<input type="text" id="a" placeholder="A">
<input type="text" id="b" placeholder="B">
<input type="text" id="c" placeholder="C">

<button onclick="sendData()">إرسال</button>

<div id="msg"></div>

</div>

<script>

async function sendData(){

    const a = document.getElementById("a").value;
    const b = document.getElementById("b").value;
    const c = document.getElementById("c").value;

    const url = "ضع_رابط_الويب_اب_هنا";

    const data = {
        a:a,
        b:b,
        c:c
    };

    try{

        const response = await fetch(url,{
            method:"POST",
            body:JSON.stringify(data)
        });

        const result = await response.text();

        document.getElementById("msg").innerHTML = result;

    }catch(err){

        document.getElementById("msg").innerHTML = err;

    }

}

</script>

</body>
</html>
