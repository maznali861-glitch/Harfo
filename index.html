<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إرسال للجدول</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:300px;
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    background:#00b894;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
    <h2>تسجيل البيانات</h2>

    <input type="text" id="a" placeholder="الخانة A">
    <input type="text" id="b" placeholder="الخانة B">
    <input type="text" id="c" placeholder="الخانة C">

    <button onclick="sendData()">إرسال</button>
</div>

<script>
async function sendData(){

    const a = document.getElementById("a").value;
    const b = document.getElementById("b").value;
    const c = document.getElementById("c").value;

    // رابط Google Apps Script
    const url = "ضع_رابط_الويب_هنا";

    const data = {
        a:a,
        b:b,
        c:c
    };

    await fetch(url,{
        method:"POST",
        body:JSON.stringify(data)
    });

    alert("تم الإرسال للجدول");
}
</script>

</body>
</html>
