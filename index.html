<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الدخول</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #eee; }
        .box { background: white; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
        input { width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        /* تصميم النافذة المنبثقة */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 300px; }
    </style>
</head>
<body>

<div class="box">
    <h2>تسجيل الدخول</h2>
    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
    <input type="password" id="loginPass" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
    <p style="cursor:pointer; color:blue; font-size:14px;" onclick="toggleModal()">ليس لديك حساب؟ إنشاء حساب جديد</p>
</div>

<div id="signupModal" class="modal">
    <div class="modal-content">
        <h3>إنشاء حساب جديد</h3>
        <input type="email" id="newEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="newPass" placeholder="كلمة المرور">
        <button onclick="signup()">تسجيل الحساب</button>
        <p style="cursor:pointer; color:red;" onclick="toggleModal()">إغلاق</p>
    </div>
</div>

<script>
    const supabase = supabase.createClient(
        'https://zwxsmewckqeesqtfezxv.supabase.co', 
        'sb_publishable_5tskwd1SmdpnjpddU3QPwg_RRm1hNv9'
    );

    function toggleModal() {
        const modal = document.getElementById('signupModal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }

    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPass').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message); else alert("تم الدخول!");
    }

    async function signup() {
        const email = document.getElementById('newEmail').value;
        const password = document.getElementById('newPass').value;
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) alert(error.message); else alert("تم إنشاء الحساب، تحقق من بريدك!");
    }
</script>

</body>
</html>
